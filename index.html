<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad - Estudio de Mercado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .btn-option { text-align: left; margin-bottom: 10px; width: 100%; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>
<div class="container py-5">
    <div id="setup" class="text-center">
        <h1 class="mb-4">Estudio de Mercado - BCP</h1>
        <div class="card p-5 mx-auto" style="max-width: 400px;">
            <select id="name" class="form-select mb-3">
                <option value="Juan">Juan</option>
                <option value="Sebastian">Sebastian</option>
                <option value="Yair">Yair</option>
                <option value="Natalia">Natalia</option>
            </select>
            <button onclick="start()" class="btn btn-primary w-100">Comenzar</button>
        </div>
    </div>
    <div id="quiz" style="display:none;">
        <h3 id="qText" class="mb-4"></h3>
        <div id="opts"></div>
    </div>
    <div id="done" style="display:none;" class="text-center">
        <h2>¡Listo! Puntaje: <span id="score"></span>/15</h2>
    </div>
</div>
<script>
const URL = 'https://script.google.com/macros/s/AKfycbynSakHP7Dj4bPN1Xiz_Du_Gey7txrdQx0lXfIRmT_pQTRcyNJyO-v4W5iVi0A2cwBo/exec';
let cur = 0, sc = 0, answers = [], student = '';
const qs = Array.from({length: 15}, (_, i) => ({
    q: "Decisión " + (i+1) + ": ¿Qué estrategia es mejor en Barrancabermeja?",
    o: ["Opción A (Correcta)", "Opción B", "Opción C"],
    a: 0
}));
function start() {
    student = document.getElementById('name').value;
    document.getElementById('setup').style.display = 'none';
    doc ument.getElementById('quiz').style.display = 'block';
    show();
}
function show() {
    const q = qs[cur];
    document.getElementById('qText').innerText = q.q;
    document.getElementById('opts').innerHTML = q.o.map((o, i) => 
        '<button onclick="hit(' + i + ')" class="btn btn-outline-secondary btn-option">' + o + '</button>'
    ).join('');
}
function hit(i) {
    if(i === qs[cur].a) sc++;
    answers.push({p: cur+1, ok: i === qs[cur].a ? 'S' : 'N', r: qs[cur].o[i]});
    if(++cur < 15) show();
    else finish();
}
function finish() {
    document.getElementById('quiz').style.display = 'none';
    document.getElementById('done').style.display = 'block';
    document.getElementById('score').innerText = sc;
    fetch(URL, {method:'POST', mode:'no-cors', body:JSON.stringify({
        nombre: student, escenario: student + ' Scenario', puntaje: sc, porcentaje: (sc/15*100).toFixed(0)+'%', respuestas: answers, fecha: new Date().toLocaleString()
    })});
}
</script>
</body>
</html>
