<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío: Estudio de Mercado Barrancabermeja</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a1a; --surface: #12122a; --card: #1a1a3e; --border: #2a2a5e;
            --text: #e0e0ff; --accent: #6c5ce7; --green: #00cec9; --blue: #74b9ff; --muted: #8888bb;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
        .header { text-align: center; margin-bottom: 50px; }
        .header h1 { font-size: 2.8rem; font-weight: 800; background: linear-gradient(135deg, #a29bfe, #00cec9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .header p { color: var(--muted); font-size: 1.1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 30px; }
        .student-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 35px 20px; text-align: center; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; }
        .student-card:hover { border-color: var(--accent); transform: translateY(-8px); box-shadow: 0 15px 40px rgba(108, 92, 231, 0.3); }
        .student-card .icon { font-size: 3.5rem; margin-bottom: 20px; display: block; }
        .student-card h3 { font-size: 1.5rem; margin-bottom: 8px; color: #fff; }
        .student-card p { font-size: 0.9rem; color: #a29bfe; font-weight: 600; }
        .quiz-box { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 28px; padding: 50px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .progress { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 40px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); width: 0%; transition: width 0.5s; }
        #qText { font-size: 1.8rem; font-weight: 700; margin-bottom: 40px; }
        .options-grid { display: grid; gap: 15px; }
        .option-btn { width: 100%; text-align: left; padding: 22px; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 16px; cursor: pointer; transition: 0.2s; font-size: 1.05rem; }
        .option-btn:hover { border-color: var(--accent); background: rgba(108, 92, 231, 0.15); }
        #results { display: none; text-align: center; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; border: 8px solid var(--accent); display: flex; align-items: center; justify-content: center; margin: 0 auto 30px; font-size: 3rem; font-weight: 800; color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <div id="setup">
            <div class="header">
                <h1>Misión: Estudio de Mercado</h1>
                <p>Barrancabermeja te necesita. Selecciona tu perfil para iniciar.</p>
            </div>
            <div class="grid">
                <div class="student-card" onclick="start('Juan', 'Taller de Repuestos')"><span class="icon">🏍️</span><h3>Juan</h3><p>Motos & Accesorios</p></div>
                <div class="student-card" onclick="start('Sebastian', 'Delivery Gastronómico')"><span class="icon">🍔</span><h3>Sebastián</h3><p>Food Delivery App</p></div>
                <div class="student-card" onclick="start('Yair', 'Mantenimiento Industrial')"><span class="icon">🔧</span><h3>Yair</h3><p>Servicios a Refinería</p></div>
                <div class="student-card" onclick="start('Natalia', 'Tienda de Belleza')"><span class="icon">💄</span><h3>Natalia</h3><p>Cosmética Local</p></div>
            </div>
        </div>
        <div id="quiz" class="quiz-box">
            <div class="progress"><div id="progressFill" class="progress-fill"></div></div>
            <h2 id="qText"></h2>
            <div id="options" class="options-grid"></div>
        </div>
        <div id="results" class="quiz-box">
            <div class="score-circle" id="scoreVal">0</div>
            <h2>¡Misión Completada!</h2>
            <p id="feedback" style="margin-bottom: 30px;"></p>
            <button onclick="location.reload()" class="option-btn" style="text-align: center; background: var(--accent);">Intentar de nuevo</button>
        </div>
    </div>
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbynSakHP7Dj4bPN1Xiz_Du_Gey7txrdQx0lXfIRmT_pQTRcyNJyO-v4W5iVi0A2cwBo/exec';
        let student = '', scenario = '', currentIdx = 0, score = 0, answers = [];
        const data = {
            'Juan': [
                {q: '¿Segmento objetivo más rentable en Barrancabermeja?', o: ['Moto-taxistas', 'Dueños de barcos', 'Ciclistas'], a: 0},
                {q: '¿Ubicación estratégica?', o: ['Centro Comercial', 'Avenida 28', 'Barrio residencial'], a: 1},
                {q: '¿Ventaja competitiva?', o: ['El más barato', 'Garantía y repuestos certificados', 'Sin factura'], a: 1},
                {q: '¿Demanda insatisfecha?', o: ['Repuestos genéricos', 'Repuestos japoneses originales', 'Vender lo que hay'], a: 1},
                {q: '¿Ubicación para refinería?', o: ['Avenida 28', 'Muelle', 'Iwaná'], a: 0},
                {q: '¿Precio más importante?', o: ['Dólar', 'Disposición a pagar local', 'Sugerencia amigo'], a: 1},
                {q: '¿Promoción efectiva?', o: ['Periódico', 'WhatsApp y Facebook Groups', 'Vallas'], a: 1},
                {q: '¿Paso 1: Producto?', o: ['Arreglar motos', 'Servicio Integral de Mantenimiento', 'Venta repuestos'], a: 1}
            ],
            'Sebastian': [{q:'¿Cliente ideal?', o:['Turistas', 'Oficinistas del centro', 'Pescadores'], a:1}],
            'Yair': [{q:'¿Cliente objetivo?', o:['Público general', 'Contratistas Ecopetrol', 'Alcaldías'], a:1}],
            'Natalia': [{q:'¿Problema en Barranca?', o:['Lluvia', 'Calor extremo (maquillaje se corre)', 'Nadie vive ahí'], a:1}]
        };
        // Simplified start/show/check/finish logic
        function start(n, s) { student=n; scenario=s; studentData=data[n]; document.getElementById('setup').style.display='none'; document.getElementById('quiz').style.display='block'; show(); }
        function show() {
            const q = studentData[currentIdx];
            document.getElementById('progressFill').style.width = ((currentIdx / studentData.length) * 100) + '%';
            document.getElementById('qText').innerText = q.q;
            document.getElementById('options').innerHTML = q.o.map((opt, i) => `<button class="option-btn" onclick="check(${i})">${opt}</button>`).join('');
        }
        function check(i) {
            if(i === studentData[currentIdx].a) score++;
            if(++currentIdx < studentData.length) show(); else finish();
        }
        function finish() {
            document.getElementById('quiz').style.display='none';
            document.getElementById('results').style.display='block';
            document.getElementById('scoreVal').innerText = score;
            fetch(API_URL, {method:'POST', mode:'no-cors', body:JSON.stringify({nombre:student, escenario:scenario, puntaje:score, porcentaje:Math.round((score/studentData.length)*100)+'%', respuestas:[], fecha:new Date().toLocaleString('es-CO')})});
        }
    </script>
</body>
</html>
